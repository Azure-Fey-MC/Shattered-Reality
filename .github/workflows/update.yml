name: Update Pack
on:
  schedule:
    - cron:  '55 */6 * * *'
  workflow_dispatch:
jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create Pull Request
        run: gh pr create -B 1.20.1-quilt -H 1.20.1-dev --title 'Update Pack' --body 'Created by Github action'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge Pull Request
        run: gh pr merge 1.20.1-dev
      
