name: Update Pack
on:
  schedule:
    - cron:  '55 */6 * * *'
  workflow_dispatch:
jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Open Checkout
        uses: actions/checkout@v4
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: 1.20.1-dev
          base: 1.20.1-quilt
      - name: Merge Pull Request
        uses: maxkomarychev/merge-pal-action@master
      
